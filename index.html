<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Chess Engine</title>
    <style>
        body {
            margin: 0;
            display: grid;
            place-items: center;
            min-height: 100vh;
            background: #111;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        #evalDisplay {
            color: white;
            font: 12px Arial, sans-serif;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <canvas id="canvas" aria-label="Chess board"></canvas>
    <div id="evalDisplay" aria-live="polite">Eval: 0.00</div>
    <select id = "colorSelect" aria-label="Select player color">
        <option value="white">Play as White</option>
        <option value="black">Play as Black</option>
    </select>
    <button id="newGameBtn" aria-label="Start a new game">Reset Game</button>
    <script type="module">
        import Game from "./game.js";
        import Renderer from "./renderer/2drenderer.js";
        import { BOARD_SIZE, SQUARE_SIZE } from "./ui-constants.js";

        const canvas = document.getElementById("canvas");
        const colorSelect = document.getElementById("colorSelect");
        const newGameBtn = document.getElementById("newGameBtn");
        const evalDisplay = document.getElementById("evalDisplay");
        const renderer = new Renderer(canvas);

        let game;

        function initializeGame() {
            // Get player color: "white" = 0, "black" = 1
            const playerColor = colorSelect.value === "white" ? 0 : 1;
            game = new Game(renderer, playerColor, evalDisplay);
            game.draw();

            // If engine is white (player is black), make the first move
            if (playerColor === 1) {
                setTimeout(() => {
                    game.makeEngineMove();
                }, 500);
            }
        }

        // Initialize game on load
        initializeGame();

        // Handle color selection change
        colorSelect.addEventListener("change", () => {
            initializeGame();
        });

        // Handle new game button
        newGameBtn.addEventListener("click", () => {
            initializeGame();
        });

        // Handle canvas clicks
        canvas.addEventListener("click", (event) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = Math.floor(((event.clientX - rect.left) * scaleX) / SQUARE_SIZE);
            const y = Math.floor(((event.clientY - rect.top) * scaleY) / SQUARE_SIZE);

            if (x >= 0 && x < BOARD_SIZE && y >= 0 && y < BOARD_SIZE) {
                game.click(x, y);
            }
        });
    </script>
</body>
</html>
